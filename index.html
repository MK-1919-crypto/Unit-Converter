<!DOCTYPE html>
<html>
    <head>
        <title>Unit Converter</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="main">
            <div id="header">
                <h1>Unit Converter</h1>
                <input id="input" type="number" placeholder="Enter number">
                <button id="convert-btn">Convert</button>
            </div>
            <div class="result">
                <h3 class="unit">Length(Meter/Feet)</h3>
                <p id="length-result"></p>
            </div>
            <div class="result">
                <h3 class="unit">Volume(Liter/Gallon)</h3>
                <p id="volume-result"></p>
            </div>
            <div class="result">
                <h3 class="unit">Mass(Kilogram/Pound)</h3>
                <p id="mass-result"></p>
            </div>

        </div>
        <script src="script.js"></script>
    </body>
</html>
